<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Universal Device Audit</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
        h1 { color: var(--accent); font-size: 1.5rem; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #334155; }
        .card h3 { margin: 0; font-size: 1rem; color: var(--accent); border-bottom: 1px solid #334155; padding-bottom: 5px; margin-bottom: 10px; }
        .data-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 4px; }
        .label { color: #94a3b8; }
        .value { color: #e2e8f0; font-family: monospace; text-align: right; word-break: break-all; margin-left: 10px; }
        .highlight { color: #7ee787; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Universal Silent Audit</h1>

    <div class="grid">
        <div class="card">
            <h3>Device Identification</h3>
            <div id="hardware-output"></div>
        </div>
        <div class="card">
            <h3>Network & Location</h3>
            <div id="network-output"></div>
        </div>
        <div class="card">
            <h3>Raw Signals</h3>
            <div id="software-output"></div>
        </div>
    </div>

    <script>
        const renderData = (id, label, value, isHighlight = false) => {
            const container = document.getElementById(id);
            const valClass = isHighlight ? 'value highlight' : 'value';
            container.innerHTML += `<div class="data-row"><span class="label">${label}</span><span class="${valClass}">${value}</span></div>`;
        };

        async function getDeviceModel() {
            const ua = navigator.userAgent;
            const platform = navigator.platform;
            
            // 1. Check for High-Entropy Client Hints (New in Chrome/Android)
            if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
                const hints = await navigator.userAgentData.getHighEntropyValues(['model', 'platformVersion']);
                if (hints.model) return `${navigator.userAgentData.platform} ${hints.model}`;
            }

            // 2. Android Specific Detection
            if (/Android/i.test(ua)) {
                const match = ua.match(/Android\s([^\s;]+)(?:.*Build\/([^\s;]+))?/);
                const modelMatch = ua.match(/;\s([^;]+)\sBuild\//);
                return modelMatch ? `Android (${modelMatch[1]})` : "Android Device";
            }

            // 3. iPhone Deep Logic (Stayed original)
            if (/iPhone|iPod|iPad/.test(platform) || (platform === 'MacIntel' && navigator.maxTouchPoints > 1)) {
                const sig = `${screen.width}x${screen.height}@${window.devicePixelRatio}`;
                const appleModels = {
                    "430x932@3": "iPhone 17/16 Pro Max",
                    "402x874@3": "iPhone 17/16 Pro",
                    "393x852@3": "iPhone 16/15 Pro",
                    "390x844@3": "iPhone 14/13",
                    "375x667@2": "iPhone SE/8"
                };
                return appleModels[sig] || "Recent Apple Device";
            }

            // 4. Windows Detection
            if (ua.indexOf("Windows NT 10.0") !== -1) return "Windows 10/11";
            
            return platform || "Unknown Device";
        }

        async function runAudit() {
            // Identify Device
            const model = await getDeviceModel();
            renderData('hardware-output', 'Specific Model', model, true);
            renderData('hardware-output', 'CPU Cores', navigator.hardwareConcurrency);
            renderData('hardware-output', 'RAM (Est)', (navigator.deviceMemory || 'N/A') + ' GB');

            // Location API (Stable 2026 Provider)
            try {
                const geoRes = await fetch('http://ip-api.com/json/');
                const geo = await geoRes.json();
                renderData('network-output', 'Latitude', geo.lat, true);
                renderData('network-output', 'Longitude', geo.lon, true);
                renderData('network-output', 'City', geo.city);
            } catch (e) {
                renderData('network-output', 'Location', 'API Blocked');
            }

            // Raw Signals
            renderData('software-output', 'Platform', navigator.platform);
            renderData('software-output', 'Agent', navigator.userAgent);
        }

        runAudit();
    </script>
</body>
</html>
