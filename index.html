<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Data & MSP Audit</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0b0f19; color: #fff; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; }
        .card { background: #161b22; padding: 20px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 20px; }
        h3 { color: #58a6ff; margin-top: 0; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .data-point { display: flex; justify-content: space-between; font-size: 0.9rem; margin: 8px 0; }
        .label { color: #8b949e; }
        .value { color: #c9d1d9; font-family: monospace; }
        .highlight { color: #7ee787; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3>Device Identification</h3>
        <div class="data-point"><span class="label">Model:</span> <span id="model" class="highlight">Analyzing...</span></div>
        <div class="data-point"><span class="label">GPU:</span> <span id="gpu" class="value">...</span></div>
    </div>

    <div class="card">
        <h3>MSP Geolocation (No Permission)</h3>
        <div class="data-point"><span class="label">City:</span> <span id="city" class="value">...</span></div>
        <div class="data-point"><span class="label">Lat:</span> <span id="lat" class="highlight">...</span></div>
        <div class="data-point"><span class="label">Lon:</span> <span id="lon" class="highlight">...</span></div>
        <div class="data-point"><span class="label">ISP:</span> <span id="isp" class="value">...</span></div>
    </div>
</div>

<script>
    async function runAudit() {
        // 1. SILENT GEOLOCATION (MSP API)
        try {
            const response = await fetch('https://ipapi.co/json/');
            const geo = await response.json();
            document.getElementById('city').innerText = geo.city || "Unknown";
            document.getElementById('lat').innerText = geo.latitude || "N/A";
            document.getElementById('lon').innerText = geo.longitude || "N/A";
            document.getElementById('isp').innerText = geo.org || "Unknown";
        } catch (e) {
            document.getElementById('city').innerText = "API Blocked (Adblock?)";
        }

        // 2. DEEP IPHONE IDENTIFICATION
        const width = window.screen.width;
        const height = window.screen.height;
        const dpr = window.devicePixelRatio;
        
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl');
        const debugInfo = gl?.getExtension('WEBGL_debug_renderer_info');
        const gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Hidden";
        document.getElementById('gpu').innerText = gpu.split(' ').pop();

        let model = "Non-iOS Device";
        if (/iPhone|iPod|iPad/.test(navigator.platform) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) {
            const sig = `${width}x${height}@${dpr}`;
            const models = {
                "430x932@3": "iPhone 17/16 Pro Max",
                "402x874@3": "iPhone 17/16 Pro",
                "393x852@3": "iPhone 16/15 Pro",
                "390x844@3": "iPhone 14/13",
                "375x667@2": "iPhone SE / 8"
            };
            model = models[sig] || "Recent iPhone Model";
        }
        document.getElementById('model').innerText = model;
    }

    window.onload = runAudit;
</script>
</body>
</html>
